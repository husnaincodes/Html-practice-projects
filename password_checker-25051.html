<!DOCTYPE html>
<html>
    <head>
        <title>Password Strength Checker</title>
    </head>

    <body>
        <h2>Password Strength Checker</h2>

        <input type="password" id="password" placeholder="Enter password">
        <br><br>

        <button id="checkBtn" onclick="checkPassword()">Check Password</button>

        <p id="result"></p>
        <p id="strength"></p>
        <p id="stars"></p>

        <script>
            function checkPassword() {
                let pwd = document.getElementById("password").value;

                let length = pwd.length;
                let strengthText = "";

                if (length >= 8) {
                    strengthText = "Strong Password";
                } else if (length >= 5 && length <= 7) {
                    strengthText = "Medium Password";
                } else {
                    strengthText = "Weak Password";
                }

                let starOutput = "";
                for (let i = 0; i < length; i++) {
                    starOutput += "*";
                }

                document.getElementById("result").innerHTML = "Password: " + pwd;
                document.getElementById("strength").innerHTML = "Password Strength: " + strengthText;
                document.getElementById("stars").innerHTML = "Length Indicator: " + starOutput;
            }

            let btn = document.getElementById("checkBtn");

            btn.addEventListener("mouseover", function () {
                btn.style.backgroundColor = "lightblue";
            });

            btn.addEventListener("mouseout", function () {
                btn.style.backgroundColor = "";
            });
        </script>
    </body>
</html>
